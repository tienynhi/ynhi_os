<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ynhi OS - Trang chủ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/home.css">
</head>
<body>

<div class="app-shell">

  <!-- ===================================================== -->
  <!-- BLOCK 01 - HEADER -->
  <!-- ===================================================== -->
  <header class="home-header">
    <div class="home-logo-row">
      <div class="home-logo-mark">Y</div>
      <div class="home-logo-text-group">
        <span class="home-logo-title">Ynhi OS</span>
        <span class="home-logo-subtitle">Operating System</span>
      </div>
    </div>

    <div class="home-greeting">
      <span class="home-greeting-hello">Xin chào,</span>
      <span class="home-greeting-message">Chúc bạn một ngày làm việc hiệu quả ❤️</span>
    </div>
  </header>

  <main class="home-main">

    <!-- ===================================================== -->
    <!-- BLOCK 02 - THAO TÁC CHÍNH -->
    <!-- ===================================================== -->
    <section class="home-section">
      <button type="button"
class="action-card action-card-primary"
onclick="location.href='create-order-menu.html'">
        <span class="action-icon action-icon-primary">➕</span>
        <span class="action-text-group">
          <span class="action-title">Tạo đơn</span>
          <span class="action-desc">Tạo đơn hàng mới</span>
        </span>
      </button>

      <button type="button"
class="action-card action-card-primary"
onclick="location.href='order-dashboard.html'">
        <span class="action-icon action-icon-primary">📋</span>
        <span class="action-text-group">
          <span class="action-title">Kiểm soát đơn hàng</span>
          <span class="action-desc">Theo dõi trạng thái đơn hàng</span>
        </span>
      </button>
    </section>

    <!-- ===================================================== -->
    <!-- BLOCK 03 - PLACEHOLDER -->
    <!-- ===================================================== -->
    <section class="home-section">
      <div class="action-card action-card-placeholder">
        <span class="action-icon action-icon-placeholder">📊</span>
        <span class="action-text-group">
          <span class="action-title">Dashboard báo cáo</span>
        </span>
        <span class="badge-coming-soon">COMING SOON</span>
      </div>

      <div class="action-card action-card-placeholder">
        <span class="action-icon action-icon-placeholder">🍰</span>
        <span class="action-text-group">
          <span class="action-title">Quản lý sản phẩm</span>
        </span>
        <span class="badge-coming-soon">COMING SOON</span>
      </div>
    </section>

  </main>

  <!-- ===================================================== -->
  <!-- BLOCK 04 - BOTTOM -->
  <!-- ===================================================== -->
  <footer class="home-footer">
    <span class="home-version">Ynhi OS v0.1</span>
  </footer>

</div>

</body>
</html>
