<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Đơn nháp - Ynhi OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../assets/css/draft-list.css" rel="stylesheet">
</head>
<body>

<div class="draft-list-shell">

  <!-- BLOCK 01 HEADER -->
  <header class="draft-list-header">
    <button type="button"
    class="draft-list-back"
    aria-label="Quay lại"
    onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <h1 class="draft-list-title">Đơn nháp</h1>
    <div class="draft-list-spacer"></div>
  </header>

  <!-- BLOCK 02 SEARCH -->
  <div class="draft-list-search-wrap">
    <svg class="draft-list-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="text" class="draft-list-search-input" placeholder="Tìm tên hoặc SĐT...">
  </div>

  <!-- BLOCK 03 FILTER -->
  <div class="draft-list-filter-row">
    <button type="button" class="draft-list-chip draft-list-chip-active">Tất cả</button>
    <button type="button" class="draft-list-chip">Hôm nay</button>
  </div>

  <!-- BLOCK 04 LIST DRAFT -->
  <main class="draft-list-main" id="draft-list-main">


  </main>

</div>
<script src="../assets/js/order-model.js"></script>
<script src="../assets/js/storage.js"></script>
<script src="../assets/js/state-manager.js"></script>

<script>
initState();

function isDraftMeaningful(draft) {
  if (!draft) {
    return false;
  }
  var hasCustomerName = draft.customer && draft.customer.name;
  var hasProducts = draft.products && draft.products.length > 0;
  return Boolean(hasCustomerName || hasProducts);
}

function renderDraftList() {
  var draft = getDraft();
  var container = document.getElementById('draft-list-main');
  container.innerHTML = '';

  if (!isDraftMeaningful(draft)) {
    var empty = document.createElement('div');
    empty.className = 'draft-list-empty';
    empty.id = 'draft-list-empty';
    empty.textContent = 'Chưa có đơn nháp nào.';
    container.appendChild(empty);
    return;
  }

  var mainProduct = (draft.products && draft.products[0]) || null;
  var total = (draft.summary && draft.summary.total) || 0;

  var card = document.createElement('a');
  card.href = 'new-order.html';
  card.className = 'draft-list-card';
  card.innerHTML =
    '<div class="draft-list-card-top">' +
      '<span class="draft-list-customer-name">' + (draft.customer.name || 'Chưa có tên') + '</span>' +
      '<span class="draft-list-badge">Đơn nháp</span>' +
    '</div>' +
    '<div class="draft-list-customer-phone">' + (draft.customer.phone || '') + '</div>' +
    '<div class="draft-list-product-name">' + (mainProduct ? mainProduct.name : 'Chưa có sản phẩm') + '</div>' +
    '<div class="draft-list-card-bottom">' +
      '<span class="draft-list-total">' + total.toLocaleString('vi-VN') + 'đ</span>' +
      '<span class="draft-list-date">Đang chỉnh sửa</span>' +
    '</div>';

  container.appendChild(card);
}

renderDraftList();
</script>
</body>
</html>
