<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Popup Lưu đơn nháp - Ynhi OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../assets/css/draft-save-popup.css" rel="stylesheet">
</head>
<body>

<div class="draft-popup-demo-shell">

  <button type="button" class="draft-popup-demo-trigger" onclick="openDraftPopup()">Xem demo Popup</button>

  <!-- BLOCK 01 Overlay -->
  <div class="draft-popup-overlay" id="draft-popup-overlay" onclick="handleOverlayClick(event)">

    <!-- BLOCK 02 Sheet -->
    <div class="draft-popup-sheet" id="draft-popup-sheet">

      <div class="draft-popup-sheet-handle"></div>

      <!-- BLOCK 03 Icon -->
      <div class="draft-popup-icon-wrap">
        <span class="draft-popup-icon">📝</span>
      </div>

      <!-- BLOCK 04 Text -->
      <div class="draft-popup-text-group">
        <h2 class="draft-popup-title">Lưu đơn nháp?</h2>
        <p class="draft-popup-description">Bạn đang tạo đơn cho khách. Bạn muốn lưu lại để tiếp tục sau hay tiếp tục chỉnh sửa?</p>
      </div>

      <!-- BLOCK 05 Button Group -->
      <div class="draft-popup-button-group">
        <button type="button" class="draft-popup-button-primary" onclick="saveDraft()">Lưu đơn nháp</button>
        <button type="button" class="draft-popup-button-secondary" onclick="continueEditing()">Tiếp tục chỉnh sửa</button>
        <button type="button" class="draft-popup-button-danger" onclick="discardDraft()">Hủy đơn nháp</button>
      </div>

    </div>

  </div>

</div>

<script>
/* ============================================================
   Popup Save Draft - chỉ chuẩn bị vị trí gọi State Manager.
   Ba hàm dưới đây CHƯA nối logic thật, để TODO cho bước sau.
   ============================================================ */

function saveDraft() {
  // TODO: gọi State Manager để lưu Draft hiện tại
  // TODO: sau khi lưu xong, điều hướng về Create Order Menu
  closeDraftPopup();
}

function continueEditing() {
  // TODO: không thay đổi Draft, chỉ đóng popup và tiếp tục New Order
  closeDraftPopup();
}

function discardDraft() {
  // TODO: gọi State Manager để xóa Draft hiện tại
  // TODO: sau khi xóa xong, điều hướng về Create Order Menu
  closeDraftPopup();
}

/* Điều khiển hiển thị popup - chỉ phục vụ demo giao diện trên trang này */
function openDraftPopup() {
  document.getElementById('draft-popup-overlay').classList.add('draft-popup-overlay-show');
}

function closeDraftPopup() {
  document.getElementById('draft-popup-overlay').classList.remove('draft-popup-overlay-show');
}

function handleOverlayClick(event) {
  if (event.target.id === 'draft-popup-overlay') {
    continueEditing();
  }
}
</script>

</body>
</html>
